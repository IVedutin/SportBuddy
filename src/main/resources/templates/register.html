<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Страница регистрации SportBuddy — создайте аккаунт, подтвердите email и начните находить спортивные игры и игроков рядом."
    />
    <title>Регистрация — SportBuddy</title>
    <link rel="icon" href="icons/icon.ico" sizes="any" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.png" />
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <link rel="stylesheet" href="/style/global.css" />
    <link rel="stylesheet" href="/style/styles_auth.css" />
  </head>
  <body>
    <main>
      <section class="auth">
        <div class="auth_logo">
          <a class="auth_logo-link" href="/home.html">
            <img
              class="auth_logo-image"
              src="/icons/logo.svg"
              alt="Логотип SportBuddy"
            />
          </a>
        </div>
        <div class="auth_container auth_container-signup">
          <h1 class="auth_title">Регистрация</h1>
          <p class="auth_subtitle">Создай аккаунт и находи игроков рядом</p>
          <form class="auth_form auth_form-signup" id="registerForm">
            <label class="auth_label">
              <span class="auth_label-text">
                Имя <span class="auth_required">*</span>
              </span>
              <input
                class="auth_input"
                type="text"
                id="firstName"
                name="first_name"
                placeholder="Иван"
                required
              />
            </label>
            <label class="auth_label">
              <span class="auth_label-text">
                Фамилия <span class="auth_required">*</span>
              </span>
              <input
                class="auth_input"
                type="text"
                id="lastName"
                name="last_name"
                placeholder="Иванов"
                required
              />
            </label>
            <label class="auth_label">
              <span class="auth_label-text">
                Email <span class="auth_required">*</span>
              </span>
              <input
                class="auth_input"
                type="email"
                id="email"
                name="email"
                placeholder="name@example.com"
                autocomplete="email"
                required
              />
            </label>
            <label class="auth_label">
              <span class="auth_label-text">
                Телефон <span class="auth_required">*</span>
              </span>
              <input
                class="auth_input"
                type="tel"
                id="phone"
                name="phone"
                placeholder="+7 900 000-00-00"
                autocomplete="tel"
                required
              />
            </label>
            <div id="messageContainer" class="message"></div>
            <!-- Кнопка подтверждения email -->
            <div class="email-verify-container">
              <button
                type="button"
                class="verify-button"
                id="sendCodeBtn"
                onclick="sendEmailCode()"
              >
                Подтвердить email
              </button>
            </div>
            <!-- Секция ввода кода подтверждения -->
            <div id="emailCodeSection" class="code-input-group">
              <p class="email-code-sent">Код отправлен на ваш email</p>
              <label class="auth_label">
                <span class="auth_label-text">
                  Код подтверждения <span class="auth_required">*</span>
                </span>
                <input
                  class="auth_input"
                  type="text"
                  id="emailCode"
                  placeholder="Введите 6-значный код"
                  maxlength="6"
                />
              </label>
              <button
                type="button"
                class="verify-button verify-button-margin"
                onclick="verifyEmailCode()"
              >
                Проверить код
              </button>
              <p class="resend-text">
                Не пришло письмо?
                <a
                  href="#"
                  onclick="
                    sendEmailCode();
                    return false;
                  "
                  class="resend-link"
                >
                  Отправить снова
                </a>
              </p>
            </div>
            <!-- Скрытое поле для статуса подтверждения email -->
            <input type="hidden" id="emailVerified" value="false" />
            <label class="auth_label">
              <span class="auth_label-text">
                Пароль <span class="auth_required">*</span>
              </span>
              <input
                class="auth_input"
                type="password"
                id="password"
                name="password"
                placeholder="Придумайте пароль"
                autocomplete="new-password"
                required
              />
            </label>
            <label class="auth_label">
              <span class="auth_label-text">
                Подтверждение пароля <span class="auth_required">*</span>
              </span>
              <input
                class="auth_input"
                type="password"
                id="confirmPassword"
                name="password_confirm"
                placeholder="Повторите пароль"
                autocomplete="new-password"
                required
              />
            </label>
            <button class="auth_button" type="submit" id="registerBtn">
              Создать аккаунт
            </button>
          </form>
          <p class="auth_footer">
            Уже есть аккаунт?
            <a class="auth_link" href="/login">Войти</a>
          </p>
        </div>
      </section>
    </main>
    <script src="/js/register.js"></script>
  </body>
</html>
