<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Страница регистрации SportBuddy — создайте аккаунт, чтобы находить спортивные игры и игроков рядом, записываться на тренировки и участвовать в матчах.">
    <title>Вход — SportBuddy</title>
    <link rel="icon" href="icons/icon.ico" sizes="any">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.png"> 
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <link rel="stylesheet" href="/style/global.css" />
    <link rel="stylesheet" href="/style/styles_auth.css" />
  </head>
  <body>
    <main>
      <section class="auth">
        <div class="auth_logo">
          <a class="auth_logo-link" href="/home.html">
            <img
              class="auth_logo-image"
              src="/icons/logo.svg"
              alt="Логотип SportBuddy"
            />
          </a>
        </div>
        <div class="auth_container">
          <h1 class="auth_title">Вход</h1>
          <p class="auth_subtitle">Найди игроков и игры рядом с тобой</p>
          <form class="auth_form" id="loginForm">
            <label class="auth_label">
              Email
              <input
                class="auth_input"
                type="email"
                id="email"
                name="username"
                placeholder="name@example.com"
                autocomplete="email"
                required
              />
            </label>
            <label class="auth_label">
              Пароль
              <input
                class="auth_input"
                type="password"
                id="password"
                name="password"
                placeholder="Введите пароль"
                autocomplete="current-password"
                required
              />
            </label>
            <button class="auth_button" type="submit">Войти</button>
            <div id="errorMessage" class="error"></div>
          </form>
          <div class="auth_divider">
            <span class="auth_divider-text">или</span>
          </div>
          <div class="auth_social">
            <button class="auth_social-button" type="button">
              <img
                class="auth_social-icon"
                src="/icons/messenger-max.png"
                alt="Мессенджер MAX"
              />
              Войти через MAX
            </button>
          </div>
          <p class="auth_footer">
            Нет аккаунта?
            <a class="auth_link" href="/register">Зарегистрироваться</a>
          </p>
        </div>
      </section>
    </main>
    <script src="/js/login.js"></script>
  </body>
</html>
