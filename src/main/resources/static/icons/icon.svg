<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Градиент как в надписи SportBuddy -->
    <linearGradient id="sbGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A7CF3"></stop>
      <stop offset="100%" stop-color="#20B2AA"></stop>
    </linearGradient>
  </defs>

  <!-- Светлый фон -->
  <rect width="128" height="128" rx="26" fill="#F2F4F5"></rect>

  <!-- Буквы SB -->
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" font-family="Poppins, Montserrat, Arial, sans-serif" font-size="64" font-weight="700" fill="url(#sbGradient)" letter-spacing="2">
    SB
  </text>
</svg>