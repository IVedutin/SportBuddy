# Test profile: dummy values satisfy the ${...} placeholders from the main
# application.properties. The real datasource is supplied by Testcontainers
# via @ServiceConnection, so these datasource values are only placeholders.
spring.datasource.username=test
spring.datasource.password=test

# Mail + GigaChat are mocked/unused in tests — dummy values just so the
# context can start without real secrets.
spring.mail.username=test@example.com
spring.mail.password=dummy
gigachat.authorization.key=dummy
gigachat.client.id=dummy
gigachat.client.secret=dummy

# Schema is created fresh for each test run against the throwaway container.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
