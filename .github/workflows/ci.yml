name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # ubuntu-latest ships a Docker daemon, so Testcontainers integration tests
    # run against a real PostgreSQL out of the box.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build, test and produce JaCoCo report
        run: ./mvnw -B package

      - name: Coverage summary
        if: always()
        run: |
          CSV=target/site/jacoco/jacoco.csv
          if [ -f "$CSV" ]; then
            awk -F, 'NR>1{im+=$4;ic+=$5;lm+=$8;lc+=$9}
              END{printf "### JaCoCo coverage\n\n- Instructions: %.1f%%\n- Lines: %.1f%%\n",
                  100*ic/(ic+im), 100*lc/(lc+lm)}' "$CSV" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
